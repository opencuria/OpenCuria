# Build and push deployable Docker images to GHCR.

name: Build Docker Images

on:
  push:
    branches:
      - main
    tags:
      - "*"
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  BACKEND_IMAGE: ghcr.io/opencuria/backend
  WEBAPP_IMAGE: ghcr.io/opencuria/webapp
  RUNNER_IMAGE: ghcr.io/opencuria/runner
  WORKSPACE_IMAGE: ghcr.io/opencuria/workspace

jobs:
  build-images:
    name: Build ${{ matrix.name }} image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: backend
            image: ghcr.io/opencuria/backend
            context: ./backend
            dockerfile: ./backend/Dockerfile
          - name: webapp
            image: ghcr.io/opencuria/webapp
            context: ./webapp
            dockerfile: ./webapp/Dockerfile
          - name: runner
            image: ghcr.io/opencuria/runner
            context: ./runner
            dockerfile: ./runner/Dockerfile.runner
          - name: workspace
            image: ghcr.io/opencuria/workspace
            context: ./runner
            dockerfile: ./runner/Dockerfile

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ matrix.image }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=branch
            type=ref,event=tag
            type=sha,prefix=

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
